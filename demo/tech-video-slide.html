<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sextant Architecture</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8f3ea;
        --ink: #1a2a1a;
        --forest: #3a4a3a;
        --warm: #d8c8ad;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #141812;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
      }

      main {
        width: min(100vw, 1920px);
        aspect-ratio: 16 / 9;
        padding: 54px 64px 44px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0)),
          var(--paper);
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 32px;
        border-bottom: 1px solid var(--warm);
        padding-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 48px;
        line-height: 1;
        font-weight: 750;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        font-size: 22px;
        line-height: 1.35;
        color: var(--forest);
      }

      .diagram {
        min-height: 0;
        display: grid;
        place-items: center;
      }

      .diagram img {
        width: 100%;
        max-height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 14px 22px rgba(45, 38, 28, 0.14));
      }

      footer {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        border-top: 1px solid var(--warm);
        padding-top: 16px;
        font-size: 20px;
        color: var(--forest);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Sextant Architecture</h1>
        <p>Grounded QC, parallel agents, typed plan, closed-loop lab rules.</p>
      </header>
      <section class="diagram" aria-label="Sextant architecture diagram">
        <img src="./architecture.svg" alt="Sextant architecture diagram" />
      </section>
      <footer>
        <span>Next.js 16 + Vercel AI SDK + Gemini 2.5 Flash + Tavily</span>
        <span>Every claim cites a verifiable URL.</span>
      </footer>
    </main>
  </body>
</html>
